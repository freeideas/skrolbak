<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Background Demo</title>
  <style>
    /* $REQ_DEMO_FORM_001: Glassmorphic Visual Style */
    /* $REQ_DEMO_FORM_002: Centered Placement */
    /* $REQ_DEMO_FORM_003: Foreground Layering */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .demo-form {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;

      /* Glassmorphic styling */
      background: rgba(255, 20, 147, 0.5); /* Hot pink with 50% opacity */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

      padding: 40px;
      width: 320px;
    }

    /* $REQ_DEMO_FORM_004: Form Elements */
    .demo-form h1 {
      margin: 0 0 24px 0;
      color: white;
      font-size: 28px;
      text-align: center;
    }

    .demo-form .form-group {
      margin-bottom: 20px;
    }

    .demo-form label {
      display: block;
      margin-bottom: 8px;
      color: white;
      font-size: 14px;
      font-weight: 500;
    }

    .demo-form input[type="text"],
    .demo-form input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    .demo-form input[type="text"]::placeholder,
    .demo-form input[type="password"]::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .demo-form input[type="text"]:focus,
    .demo-form input[type="password"]:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.15);
    }

    .demo-form .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .demo-form input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .demo-form .checkbox-group label {
      margin: 0;
      cursor: pointer;
    }

    .demo-form button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #ff1493;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .demo-form button:hover {
      background: rgba(255, 255, 255, 1);
    }

    .demo-form button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <!-- $REQ_ABC_006: Script Include Usage -->
  <script src="animated-background.js"></script>

  <!-- Use the animated background component with all degrees of freedom enabled -->
  <animated-background
    src="bg.jpg"
    pan-x="100"
    pan-y="100"
    pan-z="50"
    rot-x="30"
    rot-y="30"
    rot-z="20">
  </animated-background>

  <!-- $REQ_DEMO_FORM_008: Form Stationary During Animation -->
  <!-- $REQ_DEMO_FORM_005: Display Only -->
  <div class="demo-form">
    <h1>Login</h1>
    <form onsubmit="return false;">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
