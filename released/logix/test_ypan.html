<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .form-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
    }
    .glassmorphic-form {
      background: rgba(255, 105, 180, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .glassmorphic-form h2 {
      margin: 0 0 24px 0;
      color: white;
      font-size: 24px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: white;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input[type="text"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }
    .submit-button {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <animated-background src="bg.jpg" x-pan-pps-min="0" x-pan-pps-max="0" y-pan-pps-min="-20" y-pan-pps-max="20" x-rot-min="0" x-rot-max="0" y-rot-min="0" y-rot-max="0" z-rot-min="0" z-rot-max="0" z-pan-min="100" z-pan-max="100"></animated-background>
  <div class="form-container">
    <form class="glassmorphic-form">
      <h2>Welcome Back</h2>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
      <button type="button" class="submit-button">Sign In</button>
    </form>
  </div>
  <script src="animated-background.js"></script>
</body>
</html>
