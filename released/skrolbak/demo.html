<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skrolbak Demo</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* $REQ_DEMO_FORM_001: Form Positioning */
    /* $REQ_DEMO_FORM_002: Glassmorphic Appearance */
    .demo-form {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;

      /* Hot-pink with 50% opacity */
      background: rgba(255, 105, 180, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.18);

      min-width: 300px;
    }

    /* $REQ_DEMO_FORM_003: Form Elements */
    .demo-form h1 {
      margin: 0 0 30px 0;
      color: white;
      font-size: 28px;
      text-align: center;
    }

    .demo-form input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }

    .demo-form input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .demo-form label {
      display: flex;
      align-items: center;
      color: white;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .demo-form input[type="checkbox"] {
      margin-right: 10px;
      cursor: pointer;
    }

    .demo-form button {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .demo-form button:hover {
      background: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <animated-background
    src="bg.jpg"
    pan-x="100"
    pan-y="75"
    pan-z="50"
    rot-x="50"
    rot-y="100"
    rot-z="25">
  </animated-background>

  <!-- $REQ_DEMO_FORM_003: Form Elements -->
  <!-- $REQ_DEMO_FORM_006: Display-Only Form -->
  <div class="demo-form">
    <h1>Welcome</h1>
    <input type="text" placeholder="Username" />
    <label>
      <input type="checkbox" />
      Remember me
    </label>
    <button type="button">Sign In</button>
  </div>

  <script src="animated-background.js"></script>
</body>
</html>
